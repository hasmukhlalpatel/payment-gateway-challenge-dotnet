{{- /*
Payment Gateway - Kubernetes Deployment Template
Defines the deployment specification for the payment gateway API service
*/ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "payment-gateway.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "payment-gateway.labels" . | nindent 4 }}
  annotations:
    description: "Payment Gateway API Service Deployment"
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "payment-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "payment-gateway.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "payment-gateway.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        
        # Port configuration
        ports:
        - name: http
          containerPort: {{ .Values.container.port }}
          protocol: {{ .Values.container.protocol }}
        
        # Environment variables from values
        env:
        {{- range $key, $value := .Values.container.env }}
        - name: {{ $key }}
          value: "{{ $value }}"
        {{- end }}
        
        # Environment variables from ConfigMap
        - name: ASPNETCORE_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: {{ include "payment-gateway.fullname" . }}-config
              key: environment
        
        # Bank configuration
        - name: Bank__AuthorizeEndpoint
          valueFrom:
            configMapKeyRef:
              name: {{ include "payment-gateway.fullname" . }}-config
              key: bank.authorizeEndpoint
        
        - name: Bank__TimeoutSeconds
          valueFrom:
            configMapKeyRef:
              name: {{ include "payment-gateway.fullname" . }}-config
              key: bank.timeoutSeconds
        
        - name: Bank__MaxRetries
          valueFrom:
            configMapKeyRef:
              name: {{ include "payment-gateway.fullname" . }}-config
              key: bank.maxRetries
        
        - name: Bank__CircuitBreakerThresholdFailures
          valueFrom:
            configMapKeyRef:
              name: {{ include "payment-gateway.fullname" . }}-config
              key: bank.circuitBreakerThresholdFailures
        
        - name: Bank__CircuitBreakerTimeoutSeconds
          valueFrom:
            configMapKeyRef:
              name: {{ include "payment-gateway.fullname" . }}-config
              key: bank.circuitBreakerTimeoutSeconds
        
        - name: Bank__BulkheadMaxParallelization
          valueFrom:
            configMapKeyRef:
              name: {{ include "payment-gateway.fullname" . }}-config
              key: bank.bulkheadMaxParallelization
        
        - name: Bank__BulkheadMaxQueueingActions
          valueFrom:
            configMapKeyRef:
              name: {{ include "payment-gateway.fullname" . }}-config
              key: bank.bulkheadMaxQueueingActions
        
        # Logging configuration
        - name: Logging__LogLevel__Default
          valueFrom:
            configMapKeyRef:
              name: {{ include "payment-gateway.fullname" . }}-config
              key: logging.level
        
        # Secrets (API Keys, etc.)
        - name: Bank__ApiKey
          valueFrom:
            secretKeyRef:
              name: {{ .Values.secrets.name }}
              key: BankApiKey
        
        - name: EncryptionKey
          valueFrom:
            secretKeyRef:
              name: {{ .Values.secrets.name }}
              key: EncryptionKey
        
        - name: APPINSIGHTS_INSTRUMENTATIONKEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.secrets.name }}
              key: AppInsightsKey
        
        {{- with .Values.container.envFrom }}
        envFrom:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        
        # Health checks
        {{- if .Values.livenessProbe.enabled }}
        livenessProbe:
          httpGet:
            path: {{ .Values.livenessProbe.httpGet.path }}
            port: {{ .Values.livenessProbe.httpGet.port }}
          initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          successThreshold: {{ .Values.livenessProbe.successThreshold }}
        {{- end }}
        
        {{- if .Values.readinessProbe.enabled }}
        readinessProbe:
          httpGet:
            path: {{ .Values.readinessProbe.httpGet.path }}
            port: {{ .Values.readinessProbe.httpGet.port }}
          initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          successThreshold: {{ .Values.readinessProbe.successThreshold }}
        {{- end }}
        
        {{- if .Values.startupProbe.enabled }}
        startupProbe:
          httpGet:
            path: {{ .Values.startupProbe.httpGet.path }}
            port: {{ .Values.startupProbe.httpGet.port }}
          initialDelaySeconds: {{ .Values.startupProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.startupProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.startupProbe.failureThreshold }}
        {{- end }}
        
        # Resources
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        
        # Security context for container
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        
        # Lifecycle hooks
        {{- with .Values.lifecycle }}
        lifecycle:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        
        # Volume mounts
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        {{- if .Values.persistence.enabled }}
        - name: data
          mountPath: {{ .Values.persistence.mountPath }}
        {{- end }}
      
      # Volumes
      volumes:
      - name: tmp
        emptyDir: {}
      {{- if .Values.persistence.enabled }}
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "payment-gateway.fullname" . }}
      {{- end }}
