---

# This file: Chart.yaml
apiVersion: v2
name: payment-gateway
description: A Helm chart for deploying Payment Gateway to Kubernetes
type: application
version: 1.0.0
appVersion: "1.0.0"

# Chart metadata
home: https://github.com/your-org/payment-gateway
sources:
  - https://github.com/your-org/payment-gateway
maintainers:
  - name: Platform Team
    email: platform@company.com
    url: https://company.com

# Dependencies (optional, for subcharts)
dependencies: []

# Keywords for searching
keywords:
  - payment-gateway
  - payments
  - banking
  - aspnet-core
  - kubernetes
  - helm

# Icon
icon: https://your-company.com/payment-gateway-icon.png

# Repository
kubeVersion: ">=1.24.0"
engine: gotpl
