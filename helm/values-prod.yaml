# Production environment configuration for payment-gateway Helm chart

global:
  environment: prod
  namespace: payment-gateway-prod

image:
  tag: "1.0.0"
  pullPolicy: IfNotPresent

replicaCount: 3

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "1000"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/enable-owasp-core-rules: "true"
  hosts:
    - host: payment-gateway.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: payment-gateway-prod-tls
      hosts:
        - payment-gateway.example.com

resources:
  limits:
    cpu: 2000m
    memory: 1Gi
  requests:
    cpu: 1000m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  # Custom metrics
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30

podDisruptionBudget:
  enabled: true
  minAvailable: 2

podSecurityPolicy:
  enabled: true
  name: restricted

config:
  bank:
    authorizeEndpoint: https://bank-api.example.com/authorize
    timeoutSeconds: 15
    maxRetries: 2
    retryDelayMilliseconds: 100
    circuitBreakerThresholdFailures: 3
    circuitBreakerTimeoutSeconds: 120
    bulkheadMaxParallelization: 100
    bulkheadMaxQueueingActions: 200
  logging:
    level: Warning
    includeScopes: false
    excludeNamespaces:
      - Microsoft
      - System
  monitoring:
    applicationInsights:
      enabled: true
      samplingPercentage: 100
    metrics:
      enabled: true

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 3

startupProbe:
  initialDelaySeconds: 0
  periodSeconds: 10
  failureThreshold: 30

networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80

terminationGracePeriodSeconds: 45

lifecycle:
  preStop:
    exec:
      command: ["/bin/sh", "-c", "sleep 25"]

monitoring:
  enabled: true
  prometheus:
    enabled: true
    port: 8080
    path: /metrics
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s

nodeSelector:
  workload: backend
  node-class: premium

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app
              operator: In
              values:
                - payment-gateway
        topologyKey: kubernetes.io/hostname
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: workload
              operator: In
              values:
                - backend

tolerations:
  - key: "dedicated"
    operator: "Equal"
    value: "backend"
    effect: "NoSchedule"

persistence:
  enabled: false

debug:
  enabled: false
